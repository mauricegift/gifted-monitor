<script>
let _user = null;
const TABS = ['info', 'avatar', 'security', 'whatsapp', 'notifications'];

async function init() {

  renderLayout(_user, 'profile');
  renderBreadcrumbs([{ label: 'Dashboard', href: '/' }, { label: 'Profile', href: null }]);
  renderProfile();
  hidePageLoader();
}

    <!-- WhatsApp Tab -->

async function togglePrefNotify(which) {
  const btn  = document.getElementById(`pref-notify-${which}-btn`);
  const knob = document.getElementById(`pref-notify-${which}-knob`);
  if (!btn) return;
  const currentOn = btn.dataset.on === 'true';
  const newOn = !currentOn;
  btn.dataset.on = newOn ? 'true' : 'false';
  btn.style.background = newOn ? '#22c55e' : '#374151';
  if (knob) knob.style.transform = newOn ? 'translateX(1.125rem)' : 'translateX(0)';
  const field = which === 'down' ? 'notify_down' : 'notify_up';
  try {
    await api('POST', '/api/auth/notification-prefs', { [field]: newOn });
    _user[field] = newOn;
    toast.success('Notification preference saved!');
  } catch (err) {
    toast.error(err.message);
    btn.dataset.on = currentOn ? 'true' : 'false';
    btn.style.background = currentOn ? '#22c55e' : '#374151';
    if (knob) knob.style.transform = currentOn ? 'translateX(1.125rem)' : 'translateX(0)';
  }
}
function switchTab(tab) {
  TABS.forEach(t => {
    document.getElementById(`panel-${t}`)?.classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}`);
    if (!btn) return;
    btn.classList.toggle('bg-green-500/10', t === tab);
    btn.classList.toggle('text-green-400', t === tab);
    btn.classList.toggle('text-gray-400', t !== tab);
    btn.classList.toggle('hover:text-gray-200', t !== tab);
    btn.classList.toggle('hover:bg-white/5', t !== tab);
  });
}

async function doChangePw() {
  const cur  = document.getElementById('cur-pw')?.value;
  const nw   = document.getElementById('new-pw')?.value;
  const conf = document.getElementById('conf-pw')?.value;

  if (!cur || !nw || !conf) return toast.error('Please fill in all fields');
  if (nw !== conf) return toast.error('New passwords do not match');

  const pwErr = validatePassword(nw);
  if (pwErr) return toast.error(pwErr);

  setBtnLoading('changepw-btn', true);
  try {
    await api('POST', '/api/auth/change-password', { currentPassword: cur, newPassword: nw });
    toast.success('Password updated successfully!');
    document.getElementById('cur-pw').value  = '';
    document.getElementById('new-pw').value  = '';
    document.getElementById('conf-pw').value = '';
    document.getElementById('pw-strength').innerHTML = '';
  } catch (err) {
    toast.error(err.message);
    if (err.message === 'Current password is incorrect') {
      const input = document.getElementById('cur-pw');
      if (input) { input.classList.add('border-red-500/50'); setTimeout(() => input.classList.remove('border-red-500/50'), 2000); }
    }
  }
  setBtnLoading('changepw-btn', false);
}

function onAvatarFileSelect(input) {
  const file = input.files?.[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) return toast.error('File too large — max 10 MB');
  const reader = new FileReader();
  reader.onload = e => openCropModal(e.target.result);
  reader.readAsDataURL(file);
}

function openCropModal(dataUrl) {
  const img = new Image();
  img.onload = () => {
    _cropImg = img;
    _cropScale = Math.max(CROP_SZ / img.width, CROP_SZ / img.height);
    _cropOffX  = (CROP_SZ - img.width  * _cropScale) / 2;
    _cropOffY  = (CROP_SZ - img.height * _cropScale) / 2;
    drawCrop();
    document.getElementById('crop-modal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  };
  img.src = dataUrl;
}

function drawCrop() {
  const canvas = document.getElementById('crop-canvas');
  const ctx    = canvas.getContext('2d');
  ctx.clearRect(0, 0, CROP_SZ, CROP_SZ);
  ctx.drawImage(_cropImg, _cropOffX, _cropOffY, _cropImg.width * _cropScale, _cropImg.height * _cropScale);
}

function applyCrop() {
  const out = document.createElement('canvas');
  out.width = out.height = CROP_SZ;
  const ctx = out.getContext('2d');
  ctx.beginPath();
  ctx.arc(CROP_SZ / 2, CROP_SZ / 2, CROP_SZ / 2, 0, Math.PI * 2);
  ctx.clip();
  ctx.drawImage(_cropImg, _cropOffX, _cropOffY, _cropImg.width * _cropScale, _cropImg.height * _cropScale);
  _pendingAvatar = out.toDataURL('image/jpeg', 0.88);
  closeCropModal();
  const wrap = document.getElementById('avatar-preview-wrap');
  if (wrap) wrap.innerHTML = `<img src="${_pendingAvatar}" class="w-full h-full object-cover" alt="preview"/>`;
  document.getElementById('avatar-save-section')?.classList.remove('hidden');
}

function cancelCrop() {
  closeCropModal();
  document.getElementById('avatar-file-input').value = '';
}

function closeCropModal() {
  document.getElementById('crop-modal').classList.add('hidden');
  document.body.style.overflow = '';
}

function cancelAvatarSelect() {
  _pendingAvatar = null;
  document.getElementById('avatar-save-section')?.classList.add('hidden');
  document.getElementById('avatar-file-input').value = '';
  const wrap = document.getElementById('avatar-preview-wrap');
  if (wrap) {
    const init2 = (_user.name || _user.username || '?').charAt(0).toUpperCase();
    wrap.innerHTML = _user.avatar
      ? `<img src="${escHtml(_user.avatar)}" class="w-full h-full object-cover" alt="avatar"/>`
      : `<span>${init2}</span>`;
  }
}

/* ─── Crop drag & zoom events (set up once) ────────── */
(function initCropEvents() {
  const wrap = document.getElementById('crop-wrap');
  const canvas = document.getElementById('crop-canvas');
  if (!wrap || !canvas) return;

  let dragging = false, dStartX, dStartY, dOffX0, dOffY0;

  function onDown(cx, cy) { dragging = true; dStartX = cx; dStartY = cy; dOffX0 = _cropOffX; dOffY0 = _cropOffY; canvas.style.cursor = 'grabbing'; }
  function onMove(cx, cy) { if (!dragging) return; _cropOffX = dOffX0 + (cx - dStartX); _cropOffY = dOffY0 + (cy - dStartY); drawCrop(); }
  function onUp()         { dragging = false; canvas.style.cursor = 'grab'; }

  canvas.addEventListener('mousedown',  e => { e.preventDefault(); onDown(e.clientX, e.clientY); });
  window.addEventListener('mousemove',  e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup',    onUp);

  canvas.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length === 1) onDown(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
  window.addEventListener('touchmove',  e => {
    if (!dragging || !_cropImg) return;
    if (e.touches.length === 1) { onMove(e.touches[0].clientX, e.touches[0].clientY); return; }
    if (e.touches.length === 2) {
      e.preventDefault();
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (window._lastPinchDist) {
        const delta = d / window._lastPinchDist;
        zoomCrop(delta, CROP_SZ / 2, CROP_SZ / 2);
      }
      window._lastPinchDist = d;
    }
  }, { passive: false });
  window.addEventListener('touchend', e => { onUp(); window._lastPinchDist = null; });

  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const delta = e.deltaY < 0 ? 1.08 : 0.93;
    const rect  = canvas.getBoundingClientRect();
    zoomCrop(delta, e.clientX - rect.left, e.clientY - rect.top);
  }, { passive: false });
})();

function zoomCrop(delta, pivotX, pivotY) {
  if (!_cropImg) return;
  const newScale = Math.max(0.05, Math.min(10, _cropScale * delta));
  _cropOffX = pivotX - (pivotX - _cropOffX) * (newScale / _cropScale);
  _cropOffY = pivotY - (pivotY - _cropOffY) * (newScale / _cropScale);
  _cropScale = newScale;
  drawCrop();
}

async function doSaveAvatar() {
  if (!_pendingAvatar) return;
  setBtnLoading('save-avatar-btn', true);
  try {
    await api('PUT', '/api/auth/avatar', { avatar: _pendingAvatar });
    _user.avatar = _pendingAvatar;
    _pendingAvatar = null;
    toast.success('Profile picture updated!');
    document.getElementById('avatar-save-section')?.classList.add('hidden');
    renderProfile();
    switchTab('avatar');
    renderHeaderUser(_user);
    const sa = document.getElementById('sidebar-avatar');
    if (sa) {
      const i = (_user.name || '?').charAt(0).toUpperCase();
      sa.innerHTML = `<img src="${_user.avatar}" class="w-full h-full object-cover rounded-full" alt="${i}"/>`;
    }
  } catch (err) { toast.error(err.message); }
  setBtnLoading('save-avatar-btn', false);
}

async function doRemoveAvatar() {
  if (!confirm('Remove your profile picture?')) return;
  try {
    await api('PUT', '/api/auth/avatar', { avatar: null });
    _user.avatar = null;
    toast.success('Profile picture removed');
    renderProfile();
    switchTab('avatar');
    renderHeaderUser(_user);
    const sa = document.getElementById('sidebar-avatar');
    if (sa) { const i = (_user.name || '?').charAt(0).toUpperCase(); sa.innerHTML = i; }
  } catch (err) { toast.error(err.message); }
}

async function doUpdateWa() {
  const whatsapp = document.getElementById('new-wa')?.value?.trim();
  const password = document.getElementById('wa-pw')?.value;

  if (!whatsapp) return toast.error('Please enter your new WhatsApp number');
  if (!password) return toast.error('Please confirm with your password');

  const phoneErr = validatePhone(whatsapp);
  if (phoneErr) return toast.error(phoneErr);

  setBtnLoading('updatewa-btn', true);
  try {
    await api('POST', '/api/auth/update-whatsapp', { whatsapp, password });
    toast.success('WhatsApp number updated!');
    _user.whatsapp = whatsapp;
    document.getElementById('new-wa').value = '';
    document.getElementById('wa-pw').value  = '';
    renderProfile();
    switchTab('whatsapp');
  } catch (err) {
    toast.error(err.message);
    if (err.message === 'Incorrect password') {
      const input = document.getElementById('wa-pw');
      if (input) { input.classList.add('border-red-500/50'); setTimeout(() => input.classList.remove('border-red-500/50'), 2000); }
    }
  }
  setBtnLoading('updatewa-btn', false);
}

init();
