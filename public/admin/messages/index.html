<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Contact Messages — Admin — Gifted Monitor</title>
<meta name="description" content="Admin contact messages panel for Gifted Monitor."/>
<meta property="og:type" content="website"/><meta property="og:site_name" content="Gifted Monitor"/>
<meta property="og:title" content="Contact Messages — Admin — Gifted Monitor"/>
<meta property="og:image" content="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<meta name="twitter:card" content="summary"/><meta name="twitter:image" content="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<link rel="icon" type="image/jpeg" href="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body style="background:#0a0d12" class="bg-[#0a0d12] text-gray-100 min-h-screen flex flex-col">

<div id="page-loader" style="position:fixed;inset:0;background:#0a0d12;z-index:9998;display:flex;align-items:center;justify-content:center">
  <div style="position:relative;width:64px;height:64px">
    <img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-16 h-16 rounded-full object-cover" alt="Gifted Monitor"/>
    <div style="position:absolute;inset:-4px;border-radius:9999px;border:3px solid #1e2740;border-top-color:#4ade80;animation:spin .7s linear infinite"></div>
  </div>
</div>

<div id="sidebar-overlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#0d1117] border-r border-[#1e2740] z-50 -translate-x-full flex flex-col shadow-2xl rounded-r-2xl">
  <div class="flex items-center justify-between px-4 py-4 border-b border-[#1e2740]">
    <div class="flex items-center gap-2"><img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-7 h-7 rounded-full object-cover" alt=""/><span class="font-bold text-sm"><span class="text-white">Gifted</span> <span class="text-green-400">Monitor</span></span></div>
    <button onclick="closeSidebar()" class="gm-close-btn text-gray-500 hover:text-gray-300 text-xl">✕</button>
  </div>
  <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-3 py-3"></nav>
</aside>

<div class="flex flex-col flex-1 pt-14">
  <header class="fixed top-0 left-0 right-0 z-30 border-b border-[#1e2740] bg-[#0d1117]/95 backdrop-blur-sm px-4 flex-shrink-0 rounded-b-2xl">
    <div class="max-w-6xl mx-auto h-14 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <button id="hamburger" onclick="toggleSidebar()" class="lg:hidden flex flex-col gap-[5px] p-1.5 rounded-lg hover:bg-white/5 transition-colors">
          <span class="block w-5 h-0.5 bg-gray-400 rounded"></span><span class="block w-5 h-0.5 bg-gray-400 rounded"></span><span class="block w-5 h-0.5 bg-gray-400 rounded"></span>
        </button>
        <a href="/" class="flex items-center gap-2 group">
          <img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-8 h-8 rounded-full object-cover shadow-lg shadow-green-500/20 transition-transform group-hover:scale-110" alt="Gifted Monitor"/>
          <span class="font-bold"><span class="text-white">Gifted</span> <span class="text-green-400">Monitor</span></span>
        </a>
        <nav id="hdr-nav" class="hidden lg:flex items-center gap-1 ml-2"></nav>
      </div>
      <div id="hdr-user-slot"></div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-6 sm:py-8 pb-28" id="main-content"></div>
  </main>

  <footer class="border-t border-[#1e2740] bg-[#0d1117] px-6 py-2.5 flex-shrink-0 rounded-t-xl">
    <div class="flex flex-col sm:flex-row items-center justify-center gap-x-4 gap-y-1">
      <p class="text-xs text-gray-600">© <script>document.write(new Date().getFullYear())</script> Gifted Monitor. All rights reserved.</p>
      <p class="text-xs text-gray-500">Crafted with <span class="heart-beat">♥</span> by <a href="https://me.giftedtech.co.ke" target="_blank" rel="noopener" class="text-blue-400 font-bold hover:text-blue-300 transition-colors">Gifted Tech</a></p>
    </div>
  </footer>
</div>

<!-- Bulk action bar (fixed bottom) -->
<div id="msg-bulk-bar" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:#0d1117;border-top:1px solid rgba(74,222,128,.25);padding:12px 16px;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:0 -4px 24px rgba(0,0,0,.5)">
  <div style="display:flex;align-items:center;gap:10px">
    <span style="width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block"></span>
    <span id="msg-bulk-count" style="font-size:13px;font-weight:600;color:#e2e8f0"></span>
    <button onclick="clearMsgSel()" style="font-size:11px;color:#6b7280;background:rgba(255,255,255,.06);border:none;border-radius:8px;padding:3px 10px;cursor:pointer">✕ Clear</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <button onclick="bulkMarkRead()" style="font-size:12px;font-weight:600;background:rgba(251,191,36,.1);color:#fbbf24;border:1px solid rgba(251,191,36,.25);border-radius:10px;padding:7px 14px;cursor:pointer;transition:background .2s" onmouseover="this.style.background='rgba(251,191,36,.2)'" onmouseout="this.style.background='rgba(251,191,36,.1)'">
      <i class="fa-solid fa-envelope-open" style="margin-right:5px"></i>Mark as Read
    </button>
    <button onclick="bulkDeleteMsgs()" style="font-size:12px;font-weight:600;background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:7px 14px;cursor:pointer;transition:background .2s" onmouseover="this.style.background='rgba(239,68,68,.2)'" onmouseout="this.style.background='rgba(239,68,68,.1)'">
      <i class="fa-solid fa-trash" style="margin-right:5px"></i>Delete
    </button>
  </div>
</div>

<!-- Message detail modal -->
<div id="msg-modal" class="gm-modal hidden fixed inset-0 z-[500] flex items-center justify-center p-4">
  <div class="gm-modal-backdrop absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeMsgModal()"></div>
  <div class="gm-modal-box relative bg-[#0d1117] border border-[#1e2740] rounded-2xl p-6 w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
    <button onclick="closeMsgModal()" class="gm-close-btn absolute top-4 right-4 text-gray-500 hover:text-gray-300 text-xl">✕</button>
    <div id="msg-modal-body"></div>
  </div>
</div>

<style>
.msg-cb { width:16px;height:16px;accent-color:#4ade80;cursor:pointer;flex-shrink:0 }
</style>

<script src="/assets/app.js"></script>
<script>
let _page = 1, _total = 0;
let selectedMsgs = new Set();
const PAGE_SIZE = 10;

async function init() {
  const user = await requireAdmin();
  if (!user) return;
  renderLayout(user, 'admin-messages');
  renderBreadcrumbs([
    { label: 'Dashboard', href: '/' },
    { label: 'Admin', href: '/admin/' },
    { label: 'Messages', href: null }
  ]);
  loadMessages(1);
}

async function loadMessages(page) {
  _page = page;
  selectedMsgs.clear();
  updateMsgBulkBar();
  const mc = document.getElementById('main-content');
  try {
    const data = await api('GET', `/api/admin/contact?page=${page}`);
    _total = data.total;
    const totalPages = Math.ceil(_total / PAGE_SIZE);

    mc.innerHTML = `
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6 animate-fade-up">
        <div>
          <h1 class="text-2xl font-bold">✉️ Contact Messages</h1>
          <p class="text-gray-500 text-sm mt-1">${_total} message${_total !== 1 ? 's' : ''} received${data.unread ? ` — <span class="text-amber-400 font-semibold">${data.unread} unread</span>` : ''}</p>
        </div>
      </div>

      ${data.messages.length === 0 ? `
        <div class="text-center py-20 text-gray-600">
          <div class="text-5xl mb-4">📭</div>
          <div class="text-lg font-semibold mb-2">No messages yet</div>
          <div class="text-sm">Contact form submissions will appear here</div>
        </div>
      ` : `
        <!-- Select-all row -->
        <div class="flex items-center gap-3 mb-3 px-1 animate-fade-up">
          <label class="flex items-center gap-2 cursor-pointer select-none group" onclick="event.stopPropagation()">
            <input type="checkbox" id="msg-select-all" class="msg-cb" onchange="toggleSelectAllMsgs()"/>
            <span class="text-xs text-gray-500 group-hover:text-gray-300 transition-colors">Select all on this page</span>
          </label>
        </div>

        <div class="flex flex-col gap-3 mb-6">
          ${data.messages.map((m, i) => `
            <div class="animate-fade-up" style="animation-delay:${i * 40}ms;position:relative">
              <label class="absolute top-4 left-4 z-10 cursor-pointer" style="position:absolute;top:14px;left:14px;z-index:10" onclick="event.stopPropagation()">
                <input type="checkbox" class="msg-cb msg-row-cb" data-mid="${m.id}" onchange="toggleMsgCheck(${m.id},this)" ${selectedMsgs.has(m.id)?'checked':''}/>
              </label>
              <div style="padding-left:2.25rem">
                <div class="bg-[#0d1117] border ${m.is_read ? 'border-[#1e2740]' : 'border-amber-500/30'} rounded-2xl p-4 sm:p-5 hover:border-green-500/30 transition-colors cursor-pointer group"
                  onclick="openMessage(${JSON.stringify(m).replace(/"/g, '&quot;')})">
                  <div class="flex items-start gap-3">
                    <div class="flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center bg-${m.is_read ? '[#1e2740]' : 'amber-500/15'} border border-${m.is_read ? '[#2d3748]' : 'amber-500/30'} text-sm font-bold ${m.is_read ? 'text-gray-400' : 'text-amber-400'}">
                      ${escHtml((m.name || '?')[0].toUpperCase())}
                    </div>
                    <div class="flex-1 min-w-0">
                      <div class="flex flex-wrap items-center gap-2 mb-1">
                        <span class="font-semibold text-gray-200 group-hover:text-white transition-colors">${escHtml(m.name)}</span>
                        ${!m.is_read ? '<span class="text-[10px] font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30 rounded-full px-2 py-0.5">NEW</span>' : ''}
                        <span class="text-xs text-gray-500 ml-auto flex-shrink-0">${fmtDate(m.created_at)}</span>
                      </div>
                      <div class="text-xs text-gray-500 mb-1.5">${escHtml(m.email)}${m.whatsapp ? ' · ' + escHtml(m.whatsapp) : ''}</div>
                      <div class="text-sm font-semibold text-gray-300 mb-1 truncate">${escHtml(m.subject)}</div>
                      <div class="text-sm text-gray-500 line-clamp-2">${escHtml(m.message)}</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        ${totalPages > 1 ? renderPagination(page, totalPages) : ''}
      `}
    `;
  } catch (err) {
    mc.innerHTML = `<div class="text-center py-16 text-red-400">Failed to load messages: ${escHtml(String(err.message || err))}</div>`;
  }
  hidePageLoader();
}

function renderPagination(cur, total) {
  const pages = [];
  for (let p = Math.max(1, cur - 2); p <= Math.min(total, cur + 2); p++) pages.push(p);
  return `
    <div class="flex items-center justify-center gap-2 mt-4">
      <button onclick="loadMessages(${cur - 1})" ${cur <= 1 ? 'disabled' : ''}
        class="px-3 py-1.5 rounded-lg text-sm font-semibold border border-[#1e2740] text-gray-400 hover:text-gray-200 hover:border-gray-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">← Prev</button>
      ${pages.map(p => `
        <button onclick="loadMessages(${p})"
          class="px-3 py-1.5 rounded-lg text-sm font-semibold border transition-colors ${p === cur ? 'bg-green-500/15 border-green-500/40 text-green-400' : 'border-[#1e2740] text-gray-400 hover:text-gray-200 hover:border-gray-600'}">${p}</button>
      `).join('')}
      <button onclick="loadMessages(${cur + 1})" ${cur >= total ? 'disabled' : ''}
        class="px-3 py-1.5 rounded-lg text-sm font-semibold border border-[#1e2740] text-gray-400 hover:text-gray-200 hover:border-gray-600 disabled:opacity-30 disabled:cursor-not-allowed transition-colors">Next →</button>
    </div>
  `;
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
}

// ── Bulk selection ─────────────────────────────────────────────────
function toggleMsgCheck(id, checkbox) {
  if (checkbox.checked) selectedMsgs.add(id);
  else selectedMsgs.delete(id);
  updateMsgBulkBar();
  const allCbs = document.querySelectorAll('.msg-row-cb');
  const allSel = document.getElementById('msg-select-all');
  if (allSel) {
    allSel.indeterminate = selectedMsgs.size > 0 && selectedMsgs.size < allCbs.length;
    allSel.checked = allCbs.length > 0 && selectedMsgs.size === allCbs.length;
  }
}

function toggleSelectAllMsgs() {
  const allSel = document.getElementById('msg-select-all');
  const allCbs = document.querySelectorAll('.msg-row-cb');
  const shouldSelect = allSel.checked;
  allCbs.forEach(cb => {
    cb.checked = shouldSelect;
    const id = parseInt(cb.dataset.mid);
    if (shouldSelect) selectedMsgs.add(id);
    else selectedMsgs.delete(id);
  });
  updateMsgBulkBar();
}

function updateMsgBulkBar() {
  const bar = document.getElementById('msg-bulk-bar');
  const countEl = document.getElementById('msg-bulk-count');
  if (!bar) return;
  if (selectedMsgs.size > 0) {
    bar.style.display = 'flex';
    countEl.textContent = `${selectedMsgs.size} message${selectedMsgs.size !== 1 ? 's' : ''} selected`;
  } else {
    bar.style.display = 'none';
  }
}

function clearMsgSel() {
  selectedMsgs.clear();
  document.querySelectorAll('.msg-cb').forEach(cb => { cb.checked = false; cb.indeterminate = false; });
  updateMsgBulkBar();
}

// ── Bulk actions ────────────────────────────────────────────────────
async function bulkMarkRead() {
  if (!selectedMsgs.size) return;
  try {
    const res = await api('POST', '/api/admin/contact/bulk', { action: 'read', ids: Array.from(selectedMsgs) });
    toast.success(`Marked ${res.success} message${res.success!==1?'s':''} as read`);
    loadMessages(_page);
  } catch (err) { toast.error(err.message); }
}

async function bulkDeleteMsgs() {
  if (!selectedMsgs.size) return;
  const n = selectedMsgs.size;
  if (!confirm(`Delete ${n} message${n!==1?'s':''}? This cannot be undone.`)) return;
  try {
    const res = await api('POST', '/api/admin/contact/bulk', { action: 'delete', ids: Array.from(selectedMsgs) });
    toast.success(`Deleted ${res.success} message${res.success!==1?'s':''}`);
    loadMessages(_page);
  } catch (err) { toast.error(err.message); }
}

// ── Single actions ─────────────────────────────────────────────────
function openMessage(m) {
  document.getElementById('msg-modal-body').innerHTML = `
    <div class="flex items-center gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-green-500/15 border border-green-500/30 flex items-center justify-center text-base font-bold text-green-400 flex-shrink-0">
        ${escHtml((m.name || '?')[0].toUpperCase())}
      </div>
      <div>
        <div class="font-bold text-gray-100">${escHtml(m.name)}</div>
        <div class="text-xs text-gray-500">${escHtml(m.email)}${m.whatsapp ? ' · ' + escHtml(m.whatsapp) : ''}</div>
      </div>
      <div class="ml-auto text-xs text-gray-600">${fmtDate(m.created_at)}</div>
    </div>
    <div class="bg-[#0a0d12] border border-[#1e2740] rounded-xl p-3 mb-4">
      <div class="text-xs text-gray-500 mb-1 uppercase tracking-wider font-semibold">Subject</div>
      <div class="text-gray-200 font-semibold">${escHtml(m.subject)}</div>
    </div>
    <div class="bg-[#0a0d12] border border-[#1e2740] rounded-xl p-3 mb-5">
      <div class="text-xs text-gray-500 mb-1 uppercase tracking-wider font-semibold">Message</div>
      <div class="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap">${escHtml(m.message)}</div>
    </div>
    <div class="flex flex-wrap gap-2">
      ${m.whatsapp ? `<a href="https://wa.me/${m.whatsapp.replace(/\D/g,'')}" target="_blank" rel="noopener"
        class="inline-flex items-center gap-1.5 text-sm font-semibold bg-green-500/10 border border-green-500/25 text-green-400 px-3 py-2 rounded-xl hover:bg-green-500/20 transition-colors">
        💬 Reply on WhatsApp
      </a>` : ''}
      <a href="mailto:${escHtml(m.email)}" class="inline-flex items-center gap-1.5 text-sm font-semibold bg-blue-500/10 border border-blue-500/25 text-blue-400 px-3 py-2 rounded-xl hover:bg-blue-500/20 transition-colors">
        📧 Reply via Email
      </a>
      ${!m.is_read ? `<button onclick="markRead(${m.id})" class="inline-flex items-center gap-1.5 text-sm font-semibold bg-amber-500/10 border border-amber-500/25 text-amber-400 px-3 py-2 rounded-xl hover:bg-amber-500/20 transition-colors">
        ✓ Mark as Read
      </button>` : ''}
      <button onclick="deleteMsg(${m.id})" class="inline-flex items-center gap-1.5 text-sm font-semibold bg-red-500/10 border border-red-500/25 text-red-400 px-3 py-2 rounded-xl hover:bg-red-500/20 transition-colors ml-auto">
        🗑️ Delete
      </button>
    </div>
  `;
  openModal('msg-modal');
  if (!m.is_read) api('PATCH', `/api/admin/contact/${m.id}/read`).catch(() => {});
}

async function markRead(id) {
  await api('PATCH', `/api/admin/contact/${id}/read`).catch(() => {});
  closeModal('msg-modal');
  loadMessages(_page);
}

async function deleteMsg(id) {
  if (!confirm('Delete this message? This cannot be undone.')) return;
  await api('DELETE', `/api/admin/contact/${id}`);
  closeModal('msg-modal');
  toast.success('Message deleted');
  loadMessages(_page);
}

function closeMsgModal() { closeModal('msg-modal'); }

init();
</script>
</body>
</html>
