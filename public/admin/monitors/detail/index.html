<div class="flex flex-col flex-1 pt-14">

        </button>
        <a href="/" class="flex items-center gap-2 group">
          <img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-8 h-8 rounded-full object-cover shadow-lg shadow-green-500/20 transition-transform group-hover:scale-110" alt="Gifted Monitor"/>
          <span class="font-bold"><span class="text-white">Gifted</span> <span class="text-green-400">Monitor</span></span>

      <p class="text-xs text-gray-500">Crafted with <span class="heart-beat">♥</span> by <a href="https://me.giftedtech.co.ke" target="_blank" rel="noopener" class="text-blue-400 font-bold hover:text-blue-300 transition-colors">Gifted Tech</a></p>
    </div>

</div>

<!-- Edit Modal -->
<div id="monitor-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] items-center justify-center p-4">
  <div class="modal-inner bg-[#0d1117] border border-[#1e2740] rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto shadow-2xl">
    <div class="flex items-center justify-between p-6 border-b border-[#1e2740]">
      <h2 id="modal-title" class="text-lg font-bold">Edit Monitor</h2>
      <button onclick="closeModal('monitor-modal')" class="gm-close-btn text-gray-500 hover:text-gray-300 text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">✕</button>
    </div>
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Monitor Name</label>
        <input id="m-name" type="text" placeholder="My Website" class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-green-500/50 outline-none transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Base URL</label>
        <input id="m-url" type="text" placeholder="https://example.com" class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-green-500/50 outline-none transition-colors"/>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Path / Endpoint <span class="normal-case font-normal text-gray-600 ml-1">— optional</span></label>
        <input id="m-path" type="text" placeholder="/api/health (leave blank for root)" class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-green-500/50 outline-none transition-colors"/>
        <p class="mt-1 text-[11px] text-gray-600">Combined: <span id="m-url-preview" class="text-green-500/70 font-mono">https://example.com</span></p>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Method</label>
        <select id="m-method" onchange="methodChanged()" class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm focus:border-green-500/50 outline-none transition-colors">
          <option>GET</option><option>HEAD</option><option>POST</option>
        </select>
      </div>
      <div id="m-body-group" class="hidden">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Request Body</label>
        <textarea id="m-body" rows="3" placeholder='{"key": "value"}' class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-green-500/50 outline-none transition-colors resize-none font-mono"></textarea>
      </div>
      <div id="m-active-wrap">
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Status</label>
        <button type="button" onclick="toggleActiveBtn()" class="flex items-center gap-3 w-full bg-[#0a0d12] border border-[#1e2740] rounded-xl px-4 py-3 text-sm transition-colors hover:border-green-500/30">
          <input id="m-active" type="checkbox" class="hidden" checked/>
          <span id="m-active-dot" style="width:10px;height:10px;border-radius:9999px;background:#4ade80;flex-shrink:0;display:inline-block"></span>
          <span id="m-active-label" class="text-gray-200 font-medium">Active</span>
          <span class="ml-auto text-[11px] text-gray-600">tap to toggle</span>
        </button>
      </div>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Check Interval</label>
        <div class="grid grid-cols-3 gap-2 mb-2">
          <button type="button" data-val="1"      onclick="selectInterval(1)"        class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">1 min</button>
          <button type="button" data-val="3"      onclick="selectInterval(3)"        class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">3 min</button>
          <button type="button" data-val="5"      onclick="selectInterval(5)"        class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">5 min</button>
          <button type="button" data-val="10"     onclick="selectInterval(10)"       class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">10 min</button>
          <button type="button" data-val="30"     onclick="selectInterval(30)"       class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">30 min</button>
          <button type="button" data-val="60"     onclick="selectInterval(60)"       class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">1 hr</button>
          <button type="button" data-val="custom" onclick="selectInterval('custom')" class="interval-opt px-2 py-2 text-xs font-semibold border border-[#1e2740] rounded-xl text-gray-400 hover:border-green-500/40 hover:text-green-400 transition-all">Custom</button>
        </div>
        <div id="custom-interval-wrap" class="hidden mt-2">
          <input id="m-custom-interval" type="number" min="1" max="1440" placeholder="Minutes (min: 1)" class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-green-500/50 outline-none transition-colors"/>
        </div>
      </div>
      <!-- Notification prefs -->
      <div class="border border-[#1e2740] rounded-xl p-4 space-y-3 bg-[#0a0d12]">
        <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">WhatsApp Notifications</p>
        <label class="flex items-center justify-between cursor-pointer select-none">
          <span class="text-sm text-gray-300">Notify when site goes <span class="text-red-400 font-semibold">DOWN</span></span>
          <button type="button" id="m-notify-down-btn" onclick="toggleNotifyBtn('down')"
            style="min-width:2.5rem;height:1.375rem;border-radius:9999px;background:#22c55e;position:relative;transition:background .2s;outline:none">
            <span id="m-notify-down-knob" style="position:absolute;top:2px;left:2px;width:1.125rem;height:1.125rem;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s;transform:translateX(1.125rem)"></span>
          </button>
          <input type="hidden" id="m-notify-down" value="true"/>
        </label>
        <label class="flex items-center justify-between cursor-pointer select-none">
          <span class="text-sm text-gray-300">Notify when site comes back <span class="text-green-400 font-semibold">UP</span></span>
          <button type="button" id="m-notify-up-btn" onclick="toggleNotifyBtn('up')"
            style="min-width:2.5rem;height:1.375rem;border-radius:9999px;background:#22c55e;position:relative;transition:background .2s;outline:none">
            <span id="m-notify-up-knob" style="position:absolute;top:2px;left:2px;width:1.125rem;height:1.125rem;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s;transform:translateX(1.125rem)"></span>
          </button>
          <input type="hidden" id="m-notify-up" value="true"/>
        </label>
      </div>
      <button id="modal-save-btn" onclick="saveAdminEdits()" class="gm-btn-primary w-full bg-green-600 hover:bg-green-500 text-white font-semibold rounded-xl py-3 text-sm flex items-center justify-center shadow-lg shadow-green-600/20"><span>Save Changes</span></button>
      <button onclick="closeModal('monitor-modal')" class="gm-btn-ghost w-full border border-[#1e2740] text-gray-400 rounded-xl py-2.5 text-sm">Cancel</button>
    </div>
  </div>
</div>
<style>.interval-opt.selected{border-color:rgba(34,197,94,.4);color:#4ade80;background:rgba(34,197,94,.08);}</style>

<script src="/assets/app.js"></script>
<script>
const monitorId = new URLSearchParams(location.search).get('id');
let monitor = null;
let _checkPage = 1;
const CHECKS_PER_PAGE = 10;
let _refreshTimer = null;

async function init() {
  if (!monitorId) return location.replace('/admin/monitors/');
  const user = await requireAdmin();
  if (!user) return;
  renderLayout(user, 'admin-monitors');
  renderBreadcrumbs([
    { label: 'Dashboard', href: '/' },
    { label: 'Admin',     href: '/admin/' },
    { label: 'Monitors',  href: '/admin/monitors/' },
    { label: 'Detail',    href: null },
  ]);
  loadDetail();
  _refreshTimer = setInterval(() => { if (!document.hidden) loadDetail(true); }, 30000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) loadDetail(true); });
}

async function loadDetail(silent = false) {
  try {
    const fresh = await api('GET', `/api/admin/monitors/${monitorId}`);
    monitor = fresh;
    renderDetail();
    if (!silent) hidePageLoader();
  } catch (err) {
    if (!silent) {
      document.getElementById('main-content').innerHTML =
        `<div class="bg-red-500/10 border border-red-500/20 rounded-xl px-4 py-3 text-red-400 text-sm">${escHtml(err.message)}</div>`;
      hidePageLoader();
    }
  }
}

function renderDetail() {
  const m = monitor, hist = m.history || [], s = m.last_status || 'unknown';
  const upCount = hist.filter(h => h.status === 'up').length;
  const dnCount = hist.filter(h => h.status === 'down').length;
  const upPct   = hist.length ? ((upCount / hist.length) * 100).toFixed(1) + '%' : '—';
  const isActive = m.is_active !== false;

  const ticks = hist.slice(-30).map(h =>
    `<div class="htick-${h.status} rounded-sm flex-shrink-0 cursor-pointer"
      data-tick-status="${escHtml(h.status)}"
      data-tick-time="${escHtml(h.checked_at||'')}"
      data-tick-response="${escHtml(fmtMs(h.response_time))}"
      data-tick-error="${escHtml(h.error_msg||'')}"
      style="width:14px;height:32px"></div>`
  ).join('');

  const reversed = [...hist].reverse();
  const totalPages = Math.max(1, Math.ceil(reversed.length / CHECKS_PER_PAGE));
  if (_checkPage > totalPages) _checkPage = totalPages;
  const pageChecks = reversed.slice((_checkPage - 1) * CHECKS_PER_PAGE, _checkPage * CHECKS_PER_PAGE);

  document.getElementById('main-content').innerHTML = `
    <div class="bg-yellow-500/10 border border-yellow-500/20 rounded-xl px-4 py-2.5 mb-4 flex items-center gap-2 animate-fade-up">
      <span class="text-yellow-400 text-xs font-semibold">👑 Admin View</span>
      <span class="text-gray-500 text-xs">— you are viewing a monitor owned by another user</span>
    </div>

    <div class="bg-[#0d1117] border border-[#1e2740] rounded-2xl p-5 sm:p-6 mb-4 animate-fade-up">
      <div class="flex flex-col sm:flex-row sm:items-start gap-4">
        <div class="flex items-start gap-3 flex-1 min-w-0">
          <div class="w-3 h-3 rounded-full mt-2 flex-shrink-0 dot-${s}"></div>
          <div class="min-w-0">
            <h1 class="text-xl font-bold truncate">${escHtml(m.name)}</h1>
            <p class="text-xs text-gray-500 mt-1 break-all">${escHtml(m.url + (m.path||''))}</p>
            ${m.user_name ? `<div class="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1.5">
              <span class="text-xs text-yellow-400/80 font-semibold">👤 ${escHtml(m.user_name)}</span>
              ${m.user_username ? `<span class="text-xs text-gray-500">@${escHtml(m.user_username)}</span>` : ''}
              ${m.user_whatsapp ? `<span class="text-xs text-gray-500">📱 ${escHtml(m.user_whatsapp)}</span>` : ''}
              ${m.user_email ? `<span class="text-xs text-gray-500">${escHtml(m.user_email)}</span>` : ''}
            </div>` : ''}
            <div class="flex flex-wrap gap-2 mt-3">
              <span class="text-xs font-bold px-2.5 py-1 rounded-full ${statusBg(s)}">${s.toUpperCase()}</span>
              <span class="text-xs text-gray-500 bg-white/5 px-2.5 py-1 rounded-full">${m.method||'GET'}</span>
              <span class="text-xs text-gray-500 bg-white/5 px-2.5 py-1 rounded-full">${m.interval_mins||5}m interval</span>
              <span class="text-xs px-2.5 py-1 rounded-full ${isActive?'bg-green-500/10 text-green-400':'bg-gray-700/30 text-gray-500'}">${isActive?'✅ Active':'⏸ Paused'}</span>
            </div>
          </div>
        </div>
        <div class="flex flex-wrap gap-2 flex-shrink-0">
          <button onclick="adminTriggerPing()" class="gm-action-chip text-xs font-semibold border border-[#1e2740] hover:border-green-500/30 text-gray-400 hover:text-green-400 px-3 py-2 rounded-xl transition-all">🔄 Check Now</button>
          <button onclick="openEditModal(monitor)" class="gm-action-chip text-xs font-semibold border border-[#1e2740] hover:border-blue-500/30 text-gray-400 hover:text-blue-400 px-3 py-2 rounded-xl transition-all">✏️ Edit</button>
          <button onclick="adminToggleActive()" class="gm-action-chip text-xs font-semibold border border-[#1e2740] hover:border-yellow-500/30 text-gray-400 hover:text-yellow-400 px-3 py-2 rounded-xl transition-all">${isActive?'⏸ Pause':'▶️ Resume'}</button>
          <button onclick="adminDeleteMon()" class="gm-action-chip text-xs font-semibold border border-red-500/20 text-red-400 hover:bg-red-500/10 px-3 py-2 rounded-xl transition-all">🗑 Delete</button>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-4 animate-fade-up delay-50">
      ${[
        ['Status',   s.toUpperCase(),            statusColor(s)],
        ['Response', fmtMs(m.last_response_time),'text-gray-100'],
        ['Uptime',   upPct,                      'text-green-400'],
        ['Checked',  timeAgo(m.last_checked),    'text-gray-300'],
      ].map(([l,v,c]) =>
        `<div class="gm-stat-card bg-[#0d1117] border border-[#1e2740] rounded-2xl p-4">
          <div class="text-xs text-gray-500 uppercase tracking-wider mb-2">${l}</div>
          <div class="text-xl font-bold ${c}">${v}</div>
        </div>`
      ).join('')}
    </div>

    <div class="bg-[#0d1117] border border-[#1e2740] rounded-2xl p-5 sm:p-6 mb-4 animate-fade-up delay-75">
      <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">WhatsApp Notifications</h3>
      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-300">Notify when site goes <span class="text-red-400 font-semibold">DOWN</span></span>
          <button type="button" onclick="toggleAdminNotifyDetail('down')"
            id="adet-notify-down-btn"
            data-on="${m.notify_down !== false ? 'true' : 'false'}"
            style="min-width:2.5rem;height:1.375rem;border-radius:9999px;background:${m.notify_down !== false ? '#22c55e' : '#374151'};position:relative;transition:background .2s;outline:none">
            <span id="adet-notify-down-knob" style="position:absolute;top:2px;left:2px;width:1.125rem;height:1.125rem;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s;transform:${m.notify_down !== false ? 'translateX(1.125rem)' : 'translateX(0)'}"></span>
          </button>
        </div>
        <div class="flex items-center justify-between">
          <span class="text-sm text-gray-300">Notify when site comes back <span class="text-green-400 font-semibold">UP</span></span>
          <button type="button" onclick="toggleAdminNotifyDetail('up')"
            id="adet-notify-up-btn"
            data-on="${m.notify_up !== false ? 'true' : 'false'}"
            style="min-width:2.5rem;height:1.375rem;border-radius:9999px;background:${m.notify_up !== false ? '#22c55e' : '#374151'};position:relative;transition:background .2s;outline:none">
            <span id="adet-notify-up-knob" style="position:absolute;top:2px;left:2px;width:1.125rem;height:1.125rem;background:#fff;border-radius:9999px;box-shadow:0 1px 3px rgba(0,0,0,.4);transition:transform .2s;transform:${m.notify_up !== false ? 'translateX(1.125rem)' : 'translateX(0)'}"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="bg-[#0d1117] border border-[#1e2740] rounded-2xl p-5 sm:p-6 mb-4 animate-fade-up delay-100">
      <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Check History (${hist.length} checks) <span class="text-[10px] text-gray-600 normal-case font-normal">— hover or tap a bar for details</span></h3>
      ${hist.length === 0
        ? `<p class="text-gray-600 text-sm">No checks yet.</p>`
        : `<div class="flex flex-wrap gap-1.5 mb-4">${ticks}</div>
           <div class="flex gap-5 text-xs text-gray-500">
             <span><span class="text-green-400">■</span> Up (${upCount})</span>
             <span><span class="text-red-400">■</span> Down (${dnCount})</span>
           </div>`
      }
    </div>

    ${hist.length > 0 ? `
    <div class="bg-[#0d1117] border border-[#1e2740] rounded-2xl overflow-hidden animate-fade-up delay-150">
      <div class="px-5 py-4 border-b border-[#1e2740] flex items-center justify-between flex-wrap gap-2">
        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Recent Checks</h3>
        ${totalPages > 1 ? `<div class="flex items-center gap-1.5">
          <button onclick="changePage(${_checkPage-1})" ${_checkPage<=1?'disabled':''} class="px-2.5 py-1 text-xs rounded-lg border border-[#1e2740] text-gray-400 hover:text-gray-100 hover:border-green-500/30 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">←</button>
          <span class="text-xs text-gray-500">${_checkPage} / ${totalPages}</span>
          <button onclick="changePage(${_checkPage+1})" ${_checkPage>=totalPages?'disabled':''} class="px-2.5 py-1 text-xs rounded-lg border border-[#1e2740] text-gray-400 hover:text-gray-100 hover:border-green-500/30 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">→</button>
        </div>` : ''}
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead><tr class="border-b border-[#1e2740] bg-white/[0.02]">
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Time</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Status</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Response</th>
            <th class="text-left px-5 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Error</th>
          </tr></thead>
          <tbody>
            ${pageChecks.map(h => `
              <tr class="border-b border-[#1e2740]/50 hover:bg-white/[0.02] transition-colors">
                <td class="px-5 py-3 text-gray-400 text-xs whitespace-nowrap">${escHtml(formatTickTime(h.checked_at))}</td>
                <td class="px-5 py-3"><span class="text-xs font-bold px-2 py-1 rounded-full ${statusBg(h.status)}">${h.status.toUpperCase()}</span></td>
                <td class="px-5 py-3 text-gray-300">${fmtMs(h.response_time)}</td>
                <td class="px-5 py-3 text-gray-500 text-xs">${escHtml(h.error_msg)||'—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
      ${totalPages > 1 ? `<div class="px-5 py-3 border-t border-[#1e2740] flex items-center justify-between">
        <p class="text-xs text-gray-500">Showing ${((_checkPage-1)*CHECKS_PER_PAGE)+1}–${Math.min(_checkPage*CHECKS_PER_PAGE, reversed.length)} of ${reversed.length}</p>
        <div class="flex gap-1.5">
          <button onclick="changePage(${_checkPage-1})" ${_checkPage<=1?'disabled':''} class="px-3 py-1.5 text-xs rounded-lg border border-[#1e2740] text-gray-400 hover:text-gray-100 hover:border-green-500/30 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">← Prev</button>
          <button onclick="changePage(${_checkPage+1})" ${_checkPage>=totalPages?'disabled':''} class="px-3 py-1.5 text-xs rounded-lg border border-[#1e2740] text-gray-400 hover:text-gray-100 hover:border-green-500/30 transition-colors disabled:opacity-30 disabled:cursor-not-allowed">Next →</button>
        </div>
      </div>` : ''}
    </div>` : ''}
  `;
}

function changePage(p) {
  const total = Math.max(1, Math.ceil((monitor?.history||[]).length / CHECKS_PER_PAGE));
  _checkPage = Math.max(1, Math.min(p, total));
  renderDetail();
}

async function adminTriggerPing() {
  try { await api('POST', `/api/admin/monitors/${monitorId}/ping`); toast.info('Check triggered…'); setTimeout(() => loadDetail(true), 3500); }
  catch (err) { toast.error(err.message); }
}
async function adminToggleActive() {
  try { await api('PUT', `/api/admin/monitors/${monitorId}`, { is_active: !monitor.is_active }); loadDetail(true); }
  catch (err) { toast.error(err.message); }
}
function adminDeleteMon() {
  document.getElementById('adel-mon-name').textContent = monitor.name;
  document.getElementById('adel-mon-pw').value = '';
  document.getElementById('adel-mon-err').textContent = '';
  openModal('adel-mon-modal');
  setTimeout(() => document.getElementById('adel-mon-pw').focus(), 120);
}
async function confirmAdelMon() {
  const pw = document.getElementById('adel-mon-pw').value;
  const errEl = document.getElementById('adel-mon-err');
  if (!pw) { errEl.textContent = 'Please enter your password.'; return; }
  errEl.textContent = '';
  const btn = document.getElementById('adel-mon-btn');
  btn.disabled = true; btn.textContent = 'Deleting…';
  try {
    await api('DELETE', `/api/admin/monitors/${monitorId}`, { password: pw });
    toast.success('Monitor deleted');
    setTimeout(() => location.href = '/admin/monitors/', 700);
  } catch (err) {
    errEl.textContent = err.message || 'Incorrect password.';
    btn.disabled = false; btn.textContent = 'Delete Monitor';
  }
}
async function toggleAdminNotifyDetail(which) {
  const btn  = document.getElementById(`adet-notify-${which}-btn`);
  const knob = document.getElementById(`adet-notify-${which}-knob`);
  if (!btn) return;
  const currentOn = btn.dataset.on === 'true';
  const newOn = !currentOn;
  btn.dataset.on = newOn ? 'true' : 'false';
  btn.style.background = newOn ? '#22c55e' : '#374151';
  if (knob) knob.style.transform = newOn ? 'translateX(1.125rem)' : 'translateX(0)';
  const field = which === 'down' ? 'notify_down' : 'notify_up';
  try {
    await api('PUT', `/api/admin/monitors/${monitorId}`, { [field]: newOn });
    monitor[field] = newOn;
    toast.success('Notification preference saved!');
  } catch (err) {
    toast.error(err.message);
    btn.dataset.on = currentOn ? 'true' : 'false';
    btn.style.background = currentOn ? '#22c55e' : '#374151';
    if (knob) knob.style.transform = currentOn ? 'translateX(1.125rem)' : 'translateX(0)';
  }
}

async function saveAdminEdits() {
  const name  = document.getElementById('m-name').value.trim();
  const url   = document.getElementById('m-url').value.trim();
  const path  = document.getElementById('m-path')?.value?.trim() || null;
  const method = document.getElementById('m-method').value;
  const body  = document.getElementById('m-body')?.value?.trim();
  const intervalMins = _selInterval === 'custom'
    ? (parseInt(document.getElementById('m-custom-interval').value) || 5) : _selInterval;
  const activeChk = document.getElementById('m-active');
  if (!name || !url) return toast.error('Name and URL are required');
  setBtnLoading('modal-save-btn', true);
  try {
    const notifyDown = document.getElementById('m-notify-down')?.value !== 'false';
    const notifyUp   = document.getElementById('m-notify-up')?.value !== 'false';
    const payload = { name, url, path: path||null, method, body: body||null, intervalMins, notify_down: notifyDown, notify_up: notifyUp };
    if (activeChk) payload.is_active = activeChk.checked;
    await api('PUT', `/api/admin/monitors/${monitorId}`, payload);
    closeModal('monitor-modal'); toast.success('Monitor updated!'); loadDetail(true);
  } catch (err) { toast.error(err.message); }
  setBtnLoading('modal-save-btn', false);
}

init();
</script>

<!-- Admin delete monitor confirmation modal -->
<div id="adel-mon-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] items-center justify-center p-4">
  <div class="bg-[#0d1117] border border-[#1e2740] rounded-2xl w-full max-w-sm shadow-2xl">
    <div class="flex items-center justify-between p-5 border-b border-[#1e2740]">
      <h2 class="text-base font-bold text-red-400 flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> Delete Monitor</h2>
      <button onclick="closeModal('adel-mon-modal')" class="gm-close-btn text-gray-500 hover:text-gray-300 text-xl w-8 h-8 flex items-center justify-center rounded-lg hover:bg-white/5">✕</button>
    </div>
    <div class="p-5 space-y-4">
      <p class="text-sm text-gray-400">Permanently delete <span class="font-semibold text-gray-100" id="adel-mon-name"></span> and all its check history? This cannot be undone.</p>
      <div>
        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Enter your password to confirm</label>
        <input id="adel-mon-pw" type="password" placeholder="Your current password"
          onkeydown="if(event.key==='Enter')confirmAdelMon()"
          class="w-full bg-[#0a0d12] border border-[#1e2740] text-gray-100 rounded-xl px-4 py-3 text-sm placeholder-gray-600 focus:border-red-500/50 outline-none transition-colors"/>
        <p id="adel-mon-err" class="text-xs text-red-400 mt-1.5 min-h-[16px]"></p>
      </div>
      <button id="adel-mon-btn" onclick="confirmAdelMon()" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold rounded-xl py-3 text-sm transition-colors shadow-lg shadow-red-600/20">Delete Monitor</button>
      <button onclick="closeModal('adel-mon-modal')" class="w-full border border-[#1e2740] text-gray-400 rounded-xl py-2.5 text-sm hover:bg-white/5 transition-colors">Cancel</button>
    </div>
  </div>
</div>
</body>
