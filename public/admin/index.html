<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Admin Panel — Gifted Monitor</title>
<meta name="description" content="Gifted Monitor admin panel — manage users, monitors and system settings."/>
<meta property="og:type" content="website"/><meta property="og:site_name" content="Gifted Monitor"/>
<meta property="og:title" content="Admin Panel — Gifted Monitor"/>
<meta property="og:description" content="24/7 website uptime monitoring with instant WhatsApp alerts."/>
<meta property="og:image" content="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<meta name="twitter:card" content="summary"/><meta name="twitter:image" content="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<link rel="icon" type="image/jpeg" href="https://files.giftedtech.co.ke/image/u2wvoimage.jpg"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<link rel="preconnect" href="https://files.giftedtech.co.ke"/>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="/assets/style.css"/>
</head>
<body style="background:#0a0d12" class="bg-[#0a0d12] text-gray-100 min-h-screen flex flex-col">
<!-- Page loader -->
<div id="page-loader" style="position:fixed;inset:0;background:#0a0d12;z-index:9998;display:flex;align-items:center;justify-content:center" class="fixed inset-0 bg-[#0a0d12] z-[9998] flex items-center justify-center">
  <div class="relative w-16 h-16" style="position:relative;width:64px;height:64px">
    <img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-16 h-16 rounded-full object-cover" alt="Gifted Monitor"/>
    <div class="absolute rounded-full border-[3px] border-[#1e2740] border-t-green-400" style="position:absolute;inset:-4px;border-radius:9999px;border:3px solid #1e2740;border-top-color:#4ade80;animation:spin .7s linear infinite"></div>
  </div>
</div>
<div id="sidebar-overlay" onclick="closeSidebar()" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 opacity-0 pointer-events-none transition-opacity duration-300"></div>
<aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-[#0d1117] border-r border-[#1e2740] z-50 -translate-x-full flex flex-col shadow-2xl rounded-r-2xl">
  <div class="flex items-center justify-between px-4 py-4 border-b border-[#1e2740]">
    <div class="flex items-center gap-2"><img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-7 h-7 rounded-full object-cover" alt=""/><span class="font-bold text-sm"><span class="text-white">Gifted</span> <span class="text-green-400">Monitor</span></span></div>
    <button onclick="closeSidebar()" class="gm-close-btn text-gray-500 hover:text-gray-300 text-xl">✕</button>
  </div>
  <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-3 py-3"></nav>
</aside>

<div class="flex flex-col flex-1 pt-14">
  <header class="fixed top-0 left-0 right-0 z-30 border-b border-[#1e2740] bg-[#0d1117]/95 backdrop-blur-sm px-4 flex-shrink-0 rounded-b-2xl">
    <div class="max-w-6xl mx-auto h-14 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3">
        <button id="hamburger" onclick="toggleSidebar()" class="lg:hidden flex flex-col gap-[5px] p-1.5 rounded-lg hover:bg-white/5 transition-colors">
          <span class="block w-5 h-0.5 bg-gray-400 rounded"></span><span class="block w-5 h-0.5 bg-gray-400 rounded"></span><span class="block w-5 h-0.5 bg-gray-400 rounded"></span>
        </button>
        <a href="/" class="flex items-center gap-2 group">
          <img src="https://files.giftedtech.co.ke/image/u2wvoimage.jpg" class="w-8 h-8 rounded-full object-cover shadow-lg shadow-green-500/20 transition-transform group-hover:scale-110" alt="Gifted Monitor"/>
          <span class="font-bold"><span class="text-white">Gifted</span> <span class="text-green-400">Monitor</span></span>
        </a>
        <nav id="hdr-nav" class="hidden lg:flex items-center gap-1 ml-2"></nav>
      </div>
      <div id="hdr-user-slot"></div>
    </div>
  </header>

  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-6 sm:py-8" id="main-content">
      
    </div>
  </main>

  <footer class="border-t border-[#1e2740] bg-[#0d1117] px-6 py-2.5 flex-shrink-0 rounded-t-xl">
    <div class="flex flex-col sm:flex-row items-center justify-center gap-x-4 gap-y-1">
      <p class="text-xs text-gray-600">© <script>document.write(new Date().getFullYear())</script> Gifted Monitor. All rights reserved.</p>
      <p class="text-xs text-gray-500">Crafted with <span class="heart-beat">♥</span> by <a href="https://me.giftedtech.co.ke" target="_blank" rel="noopener" class="text-blue-400 font-bold hover:text-blue-300 transition-colors">Gifted Tech</a></p>
    </div>
  </footer>
</div>

<script src="/assets/app.js"></script>
<script>
async function init() {
  const user = await requireAdmin();
  if (!user) return;
  renderLayout(user, 'admin');
  renderBreadcrumbs([{ label: 'Dashboard', href: '/' }, { label: 'Admin', href: null }]);
  const stats = await api('GET', '/api/admin/stats').catch(() => null);
  if (!stats) return hidePageLoader();
  document.getElementById('main-content').innerHTML = `
    <div class="flex items-center justify-between mb-6 animate-fade-up">
      <div><h1 class="text-2xl font-bold">⚙️ Admin Panel</h1><p class="text-gray-500 text-sm mt-1">Platform overview and management</p></div>
    </div>
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-7">
      ${[
        {icon:'👥', label:'Total Users',    val:stats.totalUsers,    color:'text-blue-400',   bg:'bg-blue-500/5',   border:'border-blue-500/20'},
        {icon:'📡', label:'Total Monitors', val:stats.totalMonitors, color:'text-purple-400', bg:'bg-purple-500/5', border:'border-purple-500/20'},
        {icon:'✅', label:'Online',         val:stats.monitorsUp,   color:'text-green-400',  bg:'bg-green-500/5',  border:'border-green-500/20'},
        {icon:'🔴', label:'Down',           val:stats.monitorsDown, color:'text-red-400',    bg:'bg-red-500/5',    border:'border-red-500/20'},
      ].map((c,i) =>
        `<div class="animate-fade-up delay-${i*50} ${c.bg} border ${c.border} rounded-2xl p-4">
          <div class="text-xl mb-2">${c.icon}</div>
          <div class="text-xs text-gray-500 uppercase tracking-wider mb-1">${c.label}</div>
          <div class="text-3xl font-bold ${c.color}">${c.val}</div>
        </div>`
      ).join('')}
    </div>
    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 animate-fade-up delay-200">Quick Actions</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 animate-fade-up delay-250">
      <a href="/admin/users/" class="bg-[#0d1117] border border-[#1e2740] hover:border-blue-500/30 hover:-translate-y-0.5 rounded-2xl p-5 transition-all group">
        <div class="text-2xl mb-3">👥</div>
        <div class="font-semibold text-gray-200 group-hover:text-blue-400 transition-colors">Manage Users</div>
        <div class="text-xs text-gray-500 mt-1">View, edit, and delete all ${stats.totalUsers} registered user${stats.totalUsers!==1?'s':''}</div>
        <div class="text-xs text-blue-400 mt-3 font-semibold">Open →</div>
      </a>
      <a href="/admin/monitors/" class="bg-[#0d1117] border border-[#1e2740] hover:border-purple-500/30 hover:-translate-y-0.5 rounded-2xl p-5 transition-all group">
        <div class="text-2xl mb-3">📡</div>
        <div class="font-semibold text-gray-200 group-hover:text-purple-400 transition-colors">Manage Monitors</div>
        <div class="text-xs text-gray-500 mt-1">View and control all ${stats.totalMonitors} monitor${stats.totalMonitors!==1?'s':''} across all users</div>
        <div class="text-xs text-purple-400 mt-3 font-semibold">Open →</div>
      </a>
      <a href="/admin/messages/" class="bg-[#0d1117] border border-[#1e2740] hover:border-amber-500/30 hover:-translate-y-0.5 rounded-2xl p-5 transition-all group">
        <div class="text-2xl mb-3">✉️</div>
        <div class="font-semibold text-gray-200 group-hover:text-amber-400 transition-colors">Contact Messages</div>
        <div class="text-xs text-gray-500 mt-1">View and manage messages submitted via the contact form</div>
        <div class="text-xs text-amber-400 mt-3 font-semibold">Open →</div>
      </a>
    </div>
  `;
  hidePageLoader();
}
init();
</script>
</body>
</html>
